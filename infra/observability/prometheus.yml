global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: core-platform-health
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080

  - job_name: ai-orchestrator-health
    metrics_path: /health
    static_configs:
      - targets:
          - host.docker.internal:8001

  - job_name: knowledge-pipeline-health
    metrics_path: /health
    static_configs:
      - targets:
          - host.docker.internal:8002

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:9464
